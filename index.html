<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSP Parser & Merge Utility</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    .hint {
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .panel {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    textarea,
    input[type="text"] {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 8px 12px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
    }

    button:hover { filter: brightness(1.1); }

    .btn-primary {
      background: var(--accent);
      color: #052e16;
      font-weight: 700;
    }

    .btn-danger {
      background: #3f1d1d;
      border-color: #7f1d1d;
      color: #fecaca;
      padding: 4px 8px;
      font-size: 0.8rem;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      min-height: 1.2em;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .directive {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: #0b1220;
    }

    .directive h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #bfdbfe;
      word-break: break-word;
    }

    .entries {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .entry-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      justify-content: space-between;
      border: 1px solid #273246;
      border-radius: 8px;
      padding: 6px 8px;
      background: #111a2c;
    }

    .entry-text {
      overflow-wrap: anywhere;
      word-break: break-word;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
      color: #dbeafe;
      padding-top: 2px;
      margin-right: 8px;
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .out-box textarea {
      min-height: 130px;
    }

    .mode-toggle {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin: 8px 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .mode-toggle label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      font-weight: 500;
      cursor: pointer;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 980px) {
      .inputs,
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CSP Parser & Merge Utility (local)</h1>
    <div class="hint">
      Paste into <strong>CSP A</strong> and optionally <strong>CSP B</strong> either a full <code>Header set Content-Security-Policy "..."</code> line or a raw CSP string.
      Then click <strong>Analyze</strong>.
    </div>

    <div class="panel">
      <div class="inputs">
        <div>
          <label for="inputA">CSP A</label>
          <textarea id="inputA" placeholder="e.g. Header set Content-Security-Policy \"default-src 'self'; script-src 'self' https://example.com; img-src 'self' data:;\""></textarea>
        </div>
        <div>
          <label for="inputB">CSP B (optional)</label>
          <textarea id="inputB" placeholder="e.g. default-src 'self'; script-src https://cdn.example.org; style-src 'self' 'unsafe-inline';"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="analyzeBtn">Analyze</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Directives</h2>
        <div id="directivesContainer" class="empty">No analysis yet.</div>
      </div>

      <div class="panel out-box">
        <h2>Generated output</h2>

        <div class="mode-toggle" role="group" aria-label="CSP mode">
          <label><input type="radio" name="cspMode" value="enforce" checked /> Enforce</label>
          <label><input type="radio" name="cspMode" value="report-only" /> Report-Only</label>
        </div>

        <label for="outputCsp">Raw CSP string</label>
        <textarea id="outputCsp" readonly></textarea>
        <div class="actions">
          <button id="copyCsp">Copy CSP</button>
        </div>

        <label for="outputNginx">Nginx header line</label>
        <textarea id="outputNginx" readonly></textarea>
        <div class="actions">
          <button id="copyNginx">Copy Nginx</button>
        </div>

        <label for="outputHeader">.htaccess header line</label>
        <textarea id="outputHeader" readonly></textarea>
        <div class="actions">
          <button id="copyHeader">Copy Apache</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      directives: [] // [{ name: string, entries: string[] }]
    };

    const analyzeBtn = document.getElementById('analyzeBtn');
    const inputA = document.getElementById('inputA');
    const inputB = document.getElementById('inputB');
    const statusEl = document.getElementById('status');
    const directivesContainer = document.getElementById('directivesContainer');
    const outputCsp = document.getElementById('outputCsp');
    const outputNginx = document.getElementById('outputNginx');
    const outputHeader = document.getElementById('outputHeader');
    const copyCspBtn = document.getElementById('copyCsp');
    const copyNginxBtn = document.getElementById('copyNginx');
    const copyHeaderBtn = document.getElementById('copyHeader');
    const cspModeInputs = document.querySelectorAll('input[name="cspMode"]');

    analyzeBtn.addEventListener('click', handleAnalyze);
    cspModeInputs.forEach(input => input.addEventListener('change', renderAll));
    copyCspBtn.addEventListener('click', () => copyText(outputCsp.value, copyCspBtn));
    copyNginxBtn.addEventListener('click', () => copyText(outputNginx.value, copyNginxBtn));
    copyHeaderBtn.addEventListener('click', () => copyText(outputHeader.value, copyHeaderBtn));

    function handleAnalyze() {
      const rawA = inputA.value.trim();
      const rawB = inputB.value.trim();

      if (!rawA && !rawB) {
        state.directives = [];
        renderAll();
        setStatus('Please fill at least one field.', true);
        return;
      }

      const cspA = extractCsp(rawA);
      const cspB = extractCsp(rawB);

      const parsedA = cspA ? parsePolicy(cspA) : [];
      const parsedB = cspB ? parsePolicy(cspB) : [];

      if (rawA && parsedA.length === 0 && (!rawB || parsedB.length === 0)) {
        state.directives = [];
        renderAll();
        setStatus('No valid CSP found. Please check your input.', true);
        return;
      }

      if (rawA && rawB) {
        state.directives = mergePolicies(parsedA, parsedB);
        setStatus(`Merge completed: A (${parsedA.length} directives) + B (${parsedB.length} directives).`, false);
      } else if (rawA) {
        state.directives = parsedA;
        setStatus(`Using CSP A only (${parsedA.length} directives).`, false);
      } else {
        state.directives = parsedB;
        setStatus(`Using CSP B only (${parsedB.length} directives).`, false);
      }

      if (state.directives.length === 0) {
        setStatus('Input detected, but no usable directives were found.', true);
      }

      renderAll();
    }

    function extractCsp(input) {
      if (!input) return '';
      const text = input.replace(/\r/g, '').trim();

      // If full .htaccess line: try extracting after Content-Security-Policy.
      const headerRegex = /content-security-policy(?:-report-only)?\b/i;
      if (headerRegex.test(text)) {
        // 1) Quoted variant: ... Content-Security-Policy "..."
        const quoted = text.match(/content-security-policy(?:-report-only)?\b[\s\t]+(["'])([\s\S]*?)\1/i);
        if (quoted && quoted[2]) return quoted[2].trim();

        // 2) Fallback: unquoted rest after policy name
        const restMatch = text.match(/content-security-policy(?:-report-only)?\b[\s\t]+([\s\S]+)/i);
        if (restMatch && restMatch[1]) {
          let rest = restMatch[1].trim();
          rest = rest.replace(/^(set|always\s+set)\s+/i, '');
          rest = rest.replace(/["']$/, '').replace(/^["']/, '');
          return rest.trim();
        }
      }

      // Otherwise treat as raw CSP string.
      return text;
    }

    function parsePolicy(cspString) {
      if (!cspString || !cspString.includes('-')) return [];

      const segments = cspString
        .split(';')
        .map(s => s.trim())
        .filter(Boolean);

      const out = [];
      const idx = new Map();

      for (const segment of segments) {
        const tokens = segment.split(/\s+/).map(t => t.trim()).filter(Boolean);
        if (!tokens.length) continue;

        const nameRaw = tokens[0].toLowerCase();
        if (!/^[a-z][a-z0-9-]*$/.test(nameRaw)) continue;

        const values = tokens.slice(1).filter(Boolean);

        if (!idx.has(nameRaw)) {
          idx.set(nameRaw, out.length);
          out.push({ name: nameRaw, entries: [] });
        }

        const target = out[idx.get(nameRaw)];
        for (const value of values) {
          if (!target.entries.includes(value)) {
            target.entries.push(value);
          }
        }

        // Valueless directives (e.g. upgrade-insecure-requests) are preserved.
      }

      return out;
    }

    function mergePolicies(a, b) {
      const merged = a.map(d => ({ name: d.name, entries: [...d.entries] }));
      const idx = new Map(merged.map((d, i) => [d.name, i]));

      for (const directive of b) {
        if (!idx.has(directive.name)) {
          idx.set(directive.name, merged.length);
          merged.push({ name: directive.name, entries: [...directive.entries] });
          continue;
        }

        const target = merged[idx.get(directive.name)];
        for (const entry of directive.entries) {
          if (!target.entries.includes(entry)) {
            target.entries.push(entry);
          }
        }
      }

      return merged;
    }

    function buildCspString() {
      return state.directives
        .map(d => d.entries.length ? `${d.name} ${d.entries.join(' ')}` : d.name)
        .join('; ');
    }

    function getSelectedHeaderName() {
      const selected = document.querySelector('input[name="cspMode"]:checked');
      return selected && selected.value === 'report-only'
        ? 'Content-Security-Policy-Report-Only'
        : 'Content-Security-Policy';
    }

    function buildApacheHeaderString(csp, headerName) {
      const escaped = csp.replace(/"/g, '\\"');
      return `Header set ${headerName} "${escaped}"`;
    }

    function buildNginxHeaderString(csp, headerName) {
      const escaped = csp.replace(/"/g, '\\"');
      return `add_header ${headerName} "${escaped}" always;`;
    }

    function removeEntry(dirIndex, entryIndex) {
      const directive = state.directives[dirIndex];
      if (!directive) return;

      directive.entries.splice(entryIndex, 1);

      // If no entries remain, remove the directive.
      if (directive.entries.length === 0) {
        state.directives.splice(dirIndex, 1);
      }

      renderAll();
    }

    function addEntry(dirIndex, inputEl) {
      const raw = inputEl.value.trim();
      if (!raw) return;

      const directive = state.directives[dirIndex];
      if (!directive) return;

      if (!directive.entries.includes(raw)) {
        directive.entries.push(raw);
      }

      inputEl.value = '';
      renderAll();
    }

    function setStatus(message, isError) {
      statusEl.textContent = message || '';
      statusEl.style.color = isError ? '#fca5a5' : '#93c5fd';
    }

    function renderAll() {
      renderDirectives();
      const csp = buildCspString();
      const headerName = getSelectedHeaderName();
      outputCsp.value = csp;
      outputNginx.value = csp ? buildNginxHeaderString(csp, headerName) : '';
      outputHeader.value = csp ? buildApacheHeaderString(csp, headerName) : '';
    }

    function renderDirectives() {
      directivesContainer.innerHTML = '';

      if (!state.directives.length) {
        directivesContainer.className = 'empty';
        directivesContainer.textContent = 'No directives available.';
        return;
      }

      directivesContainer.className = '';

      state.directives.forEach((directive, dirIndex) => {
        const box = document.createElement('div');
        box.className = 'directive';

        const title = document.createElement('h3');
        title.textContent = directive.name;
        box.appendChild(title);

        const entriesWrap = document.createElement('div');
        entriesWrap.className = 'entries';

        if (!directive.entries.length) {
          const noEntries = document.createElement('div');
          noEntries.className = 'empty';
          noEntries.textContent = 'No entries';
          entriesWrap.appendChild(noEntries);
        } else {
          directive.entries.forEach((entry, entryIndex) => {
            const row = document.createElement('div');
            row.className = 'entry-row';

            const text = document.createElement('div');
            text.className = 'entry-text';
            text.textContent = entry;

            const btn = document.createElement('button');
            btn.className = 'btn-danger';
            btn.textContent = 'Remove';
            btn.addEventListener('click', () => removeEntry(dirIndex, entryIndex));

            row.appendChild(text);
            row.appendChild(btn);
            entriesWrap.appendChild(row);
          });
        }

        box.appendChild(entriesWrap);

        const addRow = document.createElement('div');
        addRow.className = 'add-row';

        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = "Add a new entry (e.g. https://cdn.example.com or 'self')";
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            addEntry(dirIndex, input);
          }
        });

        const addBtn = document.createElement('button');
        addBtn.textContent = 'Add';
        addBtn.addEventListener('click', () => addEntry(dirIndex, input));

        addRow.appendChild(input);
        addRow.appendChild(addBtn);

        box.appendChild(addRow);
        directivesContainer.appendChild(box);
      });
    }

    async function copyText(text, btn) {
      if (!text) return;
      const original = btn.textContent;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopy(text);
        }
        btn.textContent = 'Copied!';
      } catch (_) {
        try {
          fallbackCopy(text);
          btn.textContent = 'Copied!';
        } catch {
          btn.textContent = 'Copy failed';
        }
      }

      setTimeout(() => {
        btn.textContent = original;
      }, 1200);
    }

    function fallbackCopy(text) {
      const temp = document.createElement('textarea');
      temp.value = text;
      temp.setAttribute('readonly', '');
      temp.style.position = 'fixed';
      temp.style.left = '-9999px';
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
    }

    // Initial state
    renderAll();
  </script>
</body>
</html>
